name: Update Master Nodes

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # <--- Changed to 24 here

      - name: 🕷️ Run Web Scraper
        run: node scraper.js

      - name: 💾 Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add nodes.json sub.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-updated master proxy nodes" && git push)
